<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metaverse Plaza: Cube Collector with Bots</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0b1220;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        canvas {
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
        }
        .hud-box {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        h1 {
            margin: 0 0 5px 0;
            font-size: 20px;
            color: #38bdf8;
        }
        p {
            margin: 0;
            font-size: 14px;
            color: #cbd5e1;
        }
        #score-display {
            font-size: 24px;
            font-weight: bold;
            color: #f59e0b;
        }
        .controls {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="hud-box">
            <h1>메타버스 플라자</h1>
            <p>보유 큐브: <span id="score-display">0</span></p>
        </div>
        <div class="hud-box controls">
            <p>⌨️ <b>이동:</b> W, A, S, D 또는 방향키</p>
            <p>🎯 <b>목표:</b> 마을 곳곳에 생성되는 큐브를 수집하세요!</p>
            <p>🤖 <b>주민:</b> 맵을 돌아다니는 20명의 봇이 추가되었습니다.</p>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false; // 픽셀룩 보존

        // 화면 크기 설정
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.imageSmoothingEnabled = false; // canvas 크기 변경 시 context 상태가 리셋되므로 재설정
        }
        window.addEventListener('resize', resize);
        resize();

        // 게임 설정
        const WORLD_SIZE = 3000;
        let score = 0;
        let frameCount = 0;

        // 캐릭터 이미지 프리로드 (플레이어 1 + 봇 20 = 21장)
        const playerImg = new Image();
        playerImg.src = 'assets/avatars/0. 메인캐릭터.png';
        const botImgs = [];
        for (let i = 1; i <= 20; i++) {
            const img = new Image();
            img.src = `assets/avatars/캐릭터${i}.png`;
            botImgs.push(img);
        }

        // 배경 맵 이미지 (1500×1500 → 게임 좌표 3000×3000 으로 정수배 ×2 nearest-neighbor 업스케일)
        const bgImg = new Image();
        bgImg.src = 'assets/game/결과물2.png';

        // === 건물/소품 오브젝트 정의 ===
        // key → { src, w(표시 가로), h(표시 세로), collideRatio: [가로비, 세로비] }
        //   collideRatio가 [0,0]이면 통과 가능 (다리/소품/랜드마크 외곽 등)
        //   충돌 박스는 오브젝트의 발(footer) 부근 footprint만 잡음
        const objectDefs = {
            hanok_gate:     { src: '01_korea_hanok_gate.png',     w: 550, h: 550, collideRatio: [0.55, 0.18] },
            tourism_center: { src: '02_korea_tourism_center.png', w: 550, h: 550, collideRatio: [0.65, 0.22] },
            hanok_shop:    { src: '03_korea_hanok_shop.png',     w: 380, h: 380, collideRatio: [0.70, 0.25] },
            ramen:         { src: '04_japan_ramen.png',          w: 380, h: 380, collideRatio: [0.70, 0.25] },
            night_market:  { src: '05_taiwan_market.png',        w: 320, h: 320, collideRatio: [0,    0   ] },
            fountain:      { src: '06_fountain.png',             w: 450, h: 450, collideRatio: [0.60, 0.35] },
            red_bridge:    { src: '07_red_bridge.png',           w: 520, h: 400, collideRatio: [0,    0   ] },
            modern_gallery:{ src: '08_modern_gallery.png',       w: 600, h: 550, collideRatio: [0.70, 0.25] },
            torii:         { src: '09_japan_torii.png',          w: 380, h: 420, collideRatio: [0,    0   ] },
            statue_liberty:{ src: '10_us_statue_liberty.png',    w: 350, h: 420, collideRatio: [0.40, 0.25] },
            big_ben:       { src: '11_uk_big_ben.png',           w: 320, h: 400, collideRatio: [0.45, 0.25] },
            eiffel:        { src: '12_fr_eiffel.png',            w: 340, h: 420, collideRatio: [0.45, 0.20] },
            moai:          { src: '13_moai.png',                 w: 300, h: 340, collideRatio: [0.50, 0.30] },
            boulangerie:   { src: '14_fr_boulangerie.png',       w: 380, h: 380, collideRatio: [0.70, 0.25] },
            diner:         { src: '15_us_diner.png',             w: 380, h: 380, collideRatio: [0.75, 0.25] },
            pub:           { src: '16_uk_pub.png',               w: 370, h: 370, collideRatio: [0.70, 0.25] },
            phone_booth:   { src: '17_uk_telepohone.png',        w: 200, h: 270, collideRatio: [0.45, 0.30] },
            china_food:    { src: '18_cn_chinafood.png',         w: 240, h: 320, collideRatio: [0.40, 0.20] },
            milktea:       { src: '19_tw_milktea.png',           w: 280, h: 290, collideRatio: [0,    0   ] },
            red_light:     { src: '20_jp_redlight.png',          w: 180, h: 220, collideRatio: [0.30, 0.25] },
            bench:         { src: '21_bench.png',                w: 240, h: 180, collideRatio: [0,    0   ] },
            streetlight:   { src: '22_crosslight.png',           w: 140, h: 280, collideRatio: [0,    0   ] },
            flowers:       { src: '23_flowers.png',              w: 220, h: 180, collideRatio: [0,    0   ] },
            map_sign:      { src: '24_map.png',                  w: 240, h: 280, collideRatio: [0,    0   ] },
            arrow_sign:    { src: '25_arrow.png',                w: 200, h: 250, collideRatio: [0,    0   ] },
            sakura:        { src: '26_sakura.png',               w: 380, h: 380, collideRatio: [0.25, 0.25] }
        };
        // 이미지 프리로드
        for (const k in objectDefs) {
            const img = new Image();
            img.src = 'assets/objects/' + objectDefs[k].src;
            objectDefs[k].img = img;
        }

        // 오브젝트 인스턴스 배치 — (x, y)는 오브젝트의 발(footer) 좌표 = 그림자 중심
        // 결과물2.png (1500×1500) 의 zone 위치를 게임 좌표 3000×3000 으로 환산해 배치
        const objects = [
            // --- 메인 zone 랜드마크 ---
            { key: 'hanok_gate',      x: 480,  y: 600  }, // 좌상 입구
            { key: 'tourism_center',  x: 1280, y: 550  }, // 상단 중앙
            { key: 'fountain',        x: 2280, y: 600  }, // 우상 이벤트 광장 중심
            { key: 'red_bridge',      x: 1450, y: 1350 }, // 정중앙 시냇물 위
            { key: 'modern_gallery',  x: 1200, y: 2400 }, // 하단 중앙 전시관
            { key: 'torii',           x: 2200, y: 1500 }, // 우중 유저 공간 입구

            // --- 상점가 클러스터 (좌중) ---
            { key: 'hanok_shop',      x: 280,  y: 1200 },
            { key: 'ramen',           x: 600,  y: 1200 },
            { key: 'night_market',    x: 280,  y: 1550 },
            { key: 'milktea',         x: 600,  y: 1550 },
            { key: 'china_food',      x: 380,  y: 1750 },
            { key: 'red_light',       x: 2350, y: 1450 }, // 토리이 옆 등롱

            // --- 글로벌 랜드마크 미니어처 (zone 액센트) ---
            { key: 'statue_liberty',  x: 650,  y: 2500 }, // 모래사장 액센트
            { key: 'big_ben',         x: 2520, y: 1900 }, // 우중 액센트
            { key: 'eiffel',          x: 2400, y: 2650 }, // 잔디 정원 액센트
            { key: 'moai',            x: 300,  y: 2780 }, // 모래사장 끝

            // --- 작은 상점 (분산) ---
            { key: 'boulangerie',     x: 2100, y: 2350 }, // 잔디 정원
            { key: 'diner',           x: 480,  y: 2400 }, // 모래사장
            { key: 'pub',             x: 1800, y: 2500 }, // 정원 가
            { key: 'phone_booth',     x: 2700, y: 2100 }, // 우중 액센트

            // --- 벚꽃 나무 (3개) ---
            { key: 'sakura',          x: 1100, y: 1100 },
            { key: 'sakura',          x: 1750, y: 1500 },
            { key: 'sakura',          x: 2600, y: 2300 },

            // --- 벤치 (2개) ---
            { key: 'bench',           x: 1500, y: 800  },
            { key: 'bench',           x: 1100, y: 1900 },

            // --- 가로등 (4개, 경로변) ---
            { key: 'streetlight',     x: 900,  y: 1850 },
            { key: 'streetlight',     x: 1700, y: 1850 },
            { key: 'streetlight',     x: 2200, y: 1850 },
            { key: 'streetlight',     x: 800,  y: 2300 },

            // --- 화단 (2개) ---
            { key: 'flowers',         x: 2700, y: 2750 },
            { key: 'flowers',         x: 1450, y: 2700 },

            // --- 안내판 ---
            { key: 'map_sign',        x: 750,  y: 700  },
            { key: 'arrow_sign',      x: 1100, y: 1800 }
        ];

        // 키 입력 상태
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        // 카메라 객체
        const camera = { x: 0, y: 0 };

        // 플레이어 객체
        const player = {
            x: WORLD_SIZE / 2,
            y: WORLD_SIZE / 2,
            size: 15,
            speed: 6,
            color: '#3b82f6',
            name: '나',
            img: playerImg,
            isMoving: false,
            bobPhase: Math.random() * Math.PI * 2 // 각 캐릭터의 보빙 위상차 (동기화 방지)
        };

        // 장애물 (충돌 박스) - objects[] 의 collideRatio 값을 기반으로 자동 생성.
        // 발(footer) 좌표 기준 발 footprint만 충돌 → 큰 건물도 윗부분(지붕/탑신)은 통과 가능 = 시각적 자연
        const buildings = [];
        for (const obj of objects) {
            const def = objectDefs[obj.key];
            const [cwR, chR] = def.collideRatio;
            if (cwR > 0 && chR > 0) {
                const cw = def.w * cwR;
                const ch = def.h * chR;
                buildings.push({
                    x: obj.x - cw / 2,
                    y: obj.y - ch,
                    w: cw,
                    h: ch,
                    label: obj.key
                });
            }
        }

        // 봇 (NPC) 배열 및 생성 로직
        const bots = [];
        const NUM_BOTS = 20;
        const botColors = ['#10b981', '#ec4899', '#8b5cf6', '#f97316', '#06b6d4'];

        for(let i=0; i<NUM_BOTS; i++) {
            bots.push({
                x: Math.random() * (WORLD_SIZE - 100) + 50,
                y: Math.random() * (WORLD_SIZE - 100) + 50,
                size: 15,
                speed: 2 + Math.random() * 2, // 2 ~ 4의 속도
                color: botColors[Math.floor(Math.random() * botColors.length)],
                name: `Bot-${i+1}`,
                targetX: Math.random() * WORLD_SIZE,
                targetY: Math.random() * WORLD_SIZE,
                img: botImgs[i], // i=0 → 캐릭터1.png, i=19 → 캐릭터20.png 순서대로 할당
                isMoving: false,
                bobPhase: Math.random() * Math.PI * 2 // 보빙 위상차
            });
        }

        // 수집품 (큐브)
        let cubes = [];
        const MAX_CUBES = 30;

        function spawnCube() {
            if (cubes.length >= MAX_CUBES) return;
            
            let x, y, validPosition;
            do {
                validPosition = true;
                x = Math.random() * (WORLD_SIZE - 100) + 50;
                y = Math.random() * (WORLD_SIZE - 100) + 50;

                for (let b of buildings) {
                    if (x > b.x - 20 && x < b.x + b.w + 20 && 
                        y > b.y - 20 && y < b.y + b.h + 20) {
                        validPosition = false;
                        break;
                    }
                }
            } while (!validPosition);

            cubes.push({ x: x, y: y, size: 10, color: '#f59e0b', bobOffset: Math.random() * Math.PI * 2 });
        }

        for(let i=0; i<20; i++) spawnCube();

        // AABB 충돌 체크 함수 (반경 매개변수 추가)
        function checkCollision(nextX, nextY, radius) {
            if (nextX - radius < 0 || nextX + radius > WORLD_SIZE ||
                nextY - radius < 0 || nextY + radius > WORLD_SIZE) {
                return true;
            }

            for (let b of buildings) {
                let testX = nextX;
                let testY = nextY;

                if (nextX < b.x) testX = b.x;
                else if (nextX > b.x + b.w) testX = b.x + b.w;

                if (nextY < b.y) testY = b.y;
                else if (nextY > b.y + b.h) testY = b.y + b.h;

                let distX = nextX - testX;
                let distY = nextY - testY;
                let distance = Math.sqrt((distX*distX) + (distY*distY));

                if (distance <= radius) {
                    return true;
                }
            }
            return false;
        }

        // 게임 로직 업데이트
        function update() {
            frameCount++;

            // --- 플레이어 이동 로직 ---
            let dx = 0;
            let dy = 0;

            if (keys['ArrowUp'] || keys['KeyW']) dy -= player.speed;
            if (keys['ArrowDown'] || keys['KeyS']) dy += player.speed;
            if (keys['ArrowLeft'] || keys['KeyA']) dx -= player.speed;
            if (keys['ArrowRight'] || keys['KeyD']) dx += player.speed;

            if (dx !== 0 && dy !== 0) {
                const length = Math.sqrt(dx * dx + dy * dy);
                dx = (dx / length) * player.speed;
                dy = (dy / length) * player.speed;
            }

            const oldPx = player.x, oldPy = player.y;
            if (dx !== 0 && !checkCollision(player.x + dx, player.y, player.size)) player.x += dx;
            if (dy !== 0 && !checkCollision(player.x, player.y + dy, player.size)) player.y += dy;
            player.isMoving = (player.x !== oldPx || player.y !== oldPy);

            // --- 봇 이동 로직 ---
            bots.forEach(bot => {
                const oldBx = bot.x, oldBy = bot.y;
                let botDx = bot.targetX - bot.x;
                let botDy = bot.targetY - bot.y;
                let dist = Math.sqrt(botDx*botDx + botDy*botDy);

                // 목표 지점에 도달했거나 너무 가까워지면 새로운 목표 설정
                if (dist < 10) {
                    bot.targetX = Math.random() * WORLD_SIZE;
                    bot.targetY = Math.random() * WORLD_SIZE;
                } else {
                    let moveX = (botDx / dist) * bot.speed;
                    let moveY = (botDy / dist) * bot.speed;

                    // 건물과 충돌하지 않으면 이동, 충돌하면 즉시 새로운 방향(목표) 설정
                    if (!checkCollision(bot.x + moveX, bot.y + moveY, bot.size)) {
                        bot.x += moveX;
                        bot.y += moveY;
                    } else {
                        bot.targetX = Math.random() * WORLD_SIZE;
                        bot.targetY = Math.random() * WORLD_SIZE;
                    }
                }
                bot.isMoving = (bot.x !== oldBx || bot.y !== oldBy);
            });

            // 큐브 획득 판정
            for (let i = cubes.length - 1; i >= 0; i--) {
                const cube = cubes[i];
                const dist = Math.hypot(player.x - cube.x, player.y - cube.y);
                
                if (dist < player.size + cube.size + 10) {
                    cubes.splice(i, 1);
                    score += 100;
                    document.getElementById('score-display').innerText = score.toLocaleString();
                    spawnCube(); 
                    spawnCube(); 
                }
            }

            // 카메라 추적
            camera.x = player.x - canvas.width / 2;
            camera.y = player.y - canvas.height / 2;
            camera.x = Math.max(0, Math.min(camera.x, WORLD_SIZE - canvas.width));
            camera.y = Math.max(0, Math.min(camera.y, WORLD_SIZE - canvas.height));
        }

        // 오브젝트(건물/소품) 그리는 함수 — (x, y)는 발(footer) 위치
        function drawObject(obj) {
            const def = objectDefs[obj.key];
            if (!def.img.complete || !def.img.naturalWidth) return;
            const { x, y } = obj;
            const { w, h } = def;
            // 그림자 (발 footprint 기준 elliptical)
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.beginPath();
            ctx.ellipse(x, y, w * 0.28, w * 0.11, 0, 0, Math.PI * 2);
            ctx.fill();
            // 본체 (이미지 하단이 발에 닿게)
            ctx.drawImage(def.img, x - w/2, y - h, w, h);
        }

        // 큐브 그리는 함수 (z-sort에 포함시키기 위해 분리)
        function drawCube(cube) {
            const bob = Math.sin((frameCount * 0.05) + cube.bobOffset) * 5;
            ctx.save();
            ctx.translate(cube.x, cube.y + bob);
            ctx.rotate(frameCount * 0.02 + cube.bobOffset);
            ctx.fillStyle = cube.color;
            ctx.shadowColor = cube.color;
            ctx.shadowBlur = 15;
            ctx.fillRect(-cube.size/2, -cube.size/2, cube.size, cube.size);
            ctx.restore();
        }

        // 아바타 그리는 공통 함수 (플레이어 및 봇 재사용)
        function drawAvatar(entity, isPlayer = false) {
            const { x, y, size, color, name, img, isMoving, bobPhase = 0 } = entity;
            const drawSize = size * 2 * 4; // 원래 원 직경(size*2) 대비 4배 → 120px

            // (a) 보빙: 이동 중일 때만 캐릭터를 위아래로 살짝 흔들기 (sin파, 위상차로 동기화 방지)
            const bobOffset = isMoving ? Math.sin(frameCount * 0.35 + bobPhase) * 6 : 0;

            // (b) 그림자 강화: 더 크고 진하게 — 캐릭터가 바닥에 박힌 느낌
            //     bobOffset만큼 살짝 줄어들면 점프감 → 그림자는 고정 위치/크기로 두고
            //     캐릭터만 흔들리게 해서 "발이 땅에서 안 떨어지는" 안정감 유지
            ctx.fillStyle = 'rgba(0,0,0,0.55)';
            ctx.beginPath();
            ctx.ellipse(x, y + 15, size * 2.4, size * 1.1, 0, 0, Math.PI * 2);
            ctx.fill();

            // 캐릭터: 이미지 로드 완료 시 PNG, 미완료/실패 시 fallback 원형
            const imgReady = img && img.complete && img.naturalWidth > 0;
            if (imgReady) {
                // 발이 그림자 중심(y+15)에 닿도록 정렬 + bobOffset 적용
                ctx.drawImage(img, x - drawSize/2, y + 15 - drawSize + bobOffset, drawSize, drawSize);
            } else {
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(x, y + bobOffset, size, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = isPlayer ? '#fff' : 'rgba(255,255,255,0.5)';
                ctx.lineWidth = isPlayer ? 2 : 1;
                ctx.stroke();
            }

            // 이름표 (캐릭터 머리 위, bobOffset 따라감)
            ctx.fillStyle = isPlayer ? '#38bdf8' : '#94a3b8';
            ctx.font = isPlayer ? 'bold 12px sans-serif' : '11px sans-serif';
            ctx.textAlign = 'center';
            const labelY = imgReady ? (y + 15 - drawSize - 5 + bobOffset) : (y - 20 + bobOffset);
            ctx.fillText(name, x, labelY);
        }

        // 화면 그리기
        function draw() {
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            // 배경 맵 이미지 (로드 완료 시) 또는 fallback 다크
            if (bgImg.complete && bgImg.naturalWidth > 0) {
                ctx.drawImage(bgImg, 0, 0, WORLD_SIZE, WORLD_SIZE);
            } else {
                ctx.fillStyle = '#1e293b';
                ctx.fillRect(0, 0, WORLD_SIZE, WORLD_SIZE);
            }

            // 건물 시각 박스는 배경 이미지에 이미 그려져 있으므로 제거.
            // buildings[] 데이터는 충돌 판정용으로만 유지 (checkCollision, 큐브 스폰 회피).

            // === y-sort 드로어블: 오브젝트 + 큐브 + 봇 + 플레이어를 y 좌표 기준으로 정렬 후 그리기 ===
            // 화면 아래쪽(y가 큰)일수록 앞에 그려져서 자연스러운 톱뷰 깊이감 형성
            const drawables = [];
            for (const obj of objects)  drawables.push({ type: 'obj',    sortY: obj.y,        data: obj });
            for (const cube of cubes)   drawables.push({ type: 'cube',   sortY: cube.y,       data: cube });
            for (const bot of bots)     drawables.push({ type: 'bot',    sortY: bot.y + 15,   data: bot });
            drawables.push({                         type: 'player', sortY: player.y + 15,data: player });
            drawables.sort((a, b) => a.sortY - b.sortY);

            for (const d of drawables) {
                if (d.type === 'obj')         drawObject(d.data);
                else if (d.type === 'cube')   drawCube(d.data);
                else if (d.type === 'bot')    drawAvatar(d.data);
                else if (d.type === 'player') drawAvatar(d.data, true);
            }
            ctx.shadowBlur = 0; // 큐브 글로우 잔여 초기화

            ctx.restore();
        }

        // 게임 루프
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
