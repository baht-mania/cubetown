<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metaverse Plaza: Cube Collector with Bots</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0b1220;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        canvas {
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
        }
        .hud-box {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        h1 {
            margin: 0 0 5px 0;
            font-size: 20px;
            color: #38bdf8;
        }
        p {
            margin: 0;
            font-size: 14px;
            color: #cbd5e1;
        }
        #score-display {
            font-size: 24px;
            font-weight: bold;
            color: #f59e0b;
        }
        .controls {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 10px;
        }
        /* === 건물 진입 팝업 === */
        #popup-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: popupFadeIn 0.18s ease-out;
        }
        #popup-overlay.show { display: flex; }
        @keyframes popupFadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        #popup {
            background: rgba(15, 23, 42, 0.96);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 16px;
            padding: 32px 36px 26px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6);
            min-width: 320px;
            max-width: 440px;
            text-align: center;
            animation: popupPop 0.22s cubic-bezier(.34, 1.56, .64, 1);
        }
        @keyframes popupPop {
            from { transform: scale(0.9); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }
        #popup-text {
            font-size: 17px;
            line-height: 1.5;
            margin: 0 0 22px;
            color: #f1f5f9;
            font-weight: 500;
        }
        #popup-text strong {
            color: #38bdf8;
            font-weight: 700;
        }
        .popup-buttons {
            display: flex;
            gap: 10px;
        }
        .popup-buttons button {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.1s, background 0.15s;
            font-family: inherit;
            font-weight: 600;
        }
        #popup-yes {
            background: #3b82f6;
            color: white;
        }
        #popup-yes:hover { background: #2563eb; }
        #popup-yes:active { transform: scale(0.97); }
        #popup-no {
            background: rgba(255, 255, 255, 0.08);
            color: #cbd5e1;
        }
        #popup-no:hover { background: rgba(255, 255, 255, 0.16); }
        #popup-no:active { transform: scale(0.97); }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="hud-box">
            <h1>메타버스 플라자</h1>
            <p>보유 큐브: <span id="score-display">0</span></p>
        </div>
        <div class="hud-box controls">
            <p>⌨️ <b>이동:</b> W, A, S, D 또는 방향키</p>
            <p>🎯 <b>목표:</b> 마을 곳곳에 생성되는 큐브를 수집하세요!</p>
            <p>🤖 <b>주민:</b> 맵을 돌아다니는 20명의 봇이 추가되었습니다.</p>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- BGM (브라우저 정책상 첫 사용자 인터랙션 후 재생) -->
    <audio id="bgm" loop preload="auto">
        <source src="assets/BGM/Market_Day_at_the_Shrine.mp3" type="audio/mpeg">
    </audio>

    <!-- 건물 진입 팝업 -->
    <div id="popup-overlay">
        <div id="popup">
            <p id="popup-text"></p>
            <div class="popup-buttons">
                <button id="popup-yes">응. 이동할게</button>
                <button id="popup-no">아니, 다른 곳으로 갈게</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false; // 픽셀룩 보존

        // === BGM ===
        // 브라우저 자동재생 정책 때문에 첫 사용자 인터랙션(키/클릭) 시 재생 시작
        const bgm = document.getElementById('bgm');
        bgm.volume = 0.35;
        function startBGM() {
            bgm.play().catch(() => {});
            window.removeEventListener('keydown', startBGM);
            window.removeEventListener('click', startBGM);
        }
        window.addEventListener('keydown', startBGM, { once: true });
        window.addEventListener('click', startBGM, { once: true });

        // === 건물 진입 팝업 ===
        const popupOverlay = document.getElementById('popup-overlay');
        const popupText    = document.getElementById('popup-text');
        const popupYes     = document.getElementById('popup-yes');
        const popupNo      = document.getElementById('popup-no');
        let popupOpen = false;
        let currentPopupUrl = null;
        let activeZoneKey = null; // 현재 안에 있는 zone — 같은 zone 안에서 팝업 닫고 그 안에 머물러도 재트리거 X
        const INTERACTION_RADIUS = 240; // 오브젝트 발 위치 기준 반경

        // 한국어 조사 자동 처리: 받침 있으면 "으로", 없으면 "로"
        function withSubjectParticle(label) {
            const last = label[label.length - 1];
            const code = last.charCodeAt(0);
            const isHangul = code >= 0xAC00 && code <= 0xD7A3;
            const hasFinal = isHangul ? ((code - 0xAC00) % 28) !== 0 : true;
            return hasFinal ? '으로' : '로';
        }

        function showPopup(obj) {
            const meta = objectDefs[obj.key].interaction;
            popupText.innerHTML = `<strong>${meta.label}</strong>${withSubjectParticle(meta.label)} 이동하시겠습니까?`;
            currentPopupUrl = meta.url;
            popupOverlay.classList.add('show');
            popupOpen = true;
        }
        function closePopup() {
            popupOverlay.classList.remove('show');
            popupOpen = false;
            currentPopupUrl = null;
        }
        popupYes.addEventListener('click', () => {
            if (currentPopupUrl) window.location.href = currentPopupUrl;
        });
        popupNo.addEventListener('click', closePopup);
        // ESC로도 닫기
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && popupOpen) closePopup();
        });

        // 화면 크기 설정
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.imageSmoothingEnabled = false; // canvas 크기 변경 시 context 상태가 리셋되므로 재설정
        }
        window.addEventListener('resize', resize);
        resize();

        // 게임 설정
        const WORLD_SIZE = 3000;
        let score = 0;
        let frameCount = 0;

        // 캐릭터 이미지 프리로드 (플레이어 1 + 봇 20 = 21장)
        const playerImg = new Image();
        playerImg.src = 'assets/avatars/0. 메인캐릭터.png';
        const botImgs = [];
        for (let i = 1; i <= 20; i++) {
            const img = new Image();
            img.src = `assets/avatars/캐릭터${i}.png`;
            botImgs.push(img);
        }

        // 배경 맵 이미지 (1500×1500 → 게임 좌표 3000×3000 으로 정수배 ×2 nearest-neighbor 업스케일)
        const bgImg = new Image();
        bgImg.src = 'assets/game/결과물2.png';

        // === 건물/소품 오브젝트 정의 ===
        // key → { src, w(표시 가로), h(표시 세로), collideRatio: [가로비, 세로비] }
        //   collideRatio가 [0,0]이면 통과 가능 (다리/소품/랜드마크 외곽 등)
        //   충돌 박스는 오브젝트의 발(footer) 부근 footprint만 잡음
        // === interaction 필드 ===
        // 1~9 메인 오브젝트는 캐릭터가 가까이 가면 팝업이 떠서 외부 URL로 이동 가능
        // url은 임시로 모두 'https://www.naver.com'. 실제 링크가 결정되면 여기만 수정하면 됨.
        const objectDefs = {
            hanok_gate:     { src: '01_korea_hanok_gate.png',     w: 550, h: 550, collideRatio: [0.55, 0.18], interaction: { label: '한옥문',      url: 'https://www.naver.com' } },
            tourism_center: { src: '02_korea_tourism_center.png', w: 550, h: 550, collideRatio: [0.65, 0.22], interaction: { label: '한국여행센터', url: 'https://www.naver.com' } },
            hanok_shop:    { src: '03_korea_hanok_shop.png',     w: 380, h: 380, collideRatio: [0.70, 0.25], interaction: { label: '한옥상점',     url: 'https://www.naver.com' } },
            ramen:         { src: '04_japan_ramen.png',          w: 380, h: 380, collideRatio: [0.70, 0.25], interaction: { label: '라멘집',       url: 'https://www.naver.com' } },
            night_market:  { src: '05_taiwan_market.png',        w: 320, h: 320, collideRatio: [0,    0   ], interaction: { label: '야시장',       url: 'https://www.naver.com' } },
            fountain:      { src: '06_fountain.png',             w: 450, h: 450, collideRatio: [0.60, 0.35], interaction: { label: '분수 광장',     url: 'https://www.naver.com' } },
            red_bridge:    { src: '07_red_bridge.png',           w: 520, h: 400, collideRatio: [0,    0   ], interaction: { label: '빨간 다리',    url: 'https://www.naver.com' } },
            modern_gallery:{ src: '08_modern_gallery.png',       w: 600, h: 550, collideRatio: [0.70, 0.25], interaction: { label: '모던 갤러리',  url: 'https://www.naver.com' } },
            torii:         { src: '09_japan_torii.png',          w: 380, h: 420, collideRatio: [0,    0   ], interaction: { label: '토리이',       url: 'https://www.naver.com' } },
            statue_liberty:{ src: '10_us_statue_liberty.png',    w: 350, h: 420, collideRatio: [0.40, 0.25] },
            big_ben:       { src: '11_uk_big_ben.png',           w: 320, h: 400, collideRatio: [0.45, 0.25] },
            eiffel:        { src: '12_fr_eiffel.png',            w: 340, h: 420, collideRatio: [0.45, 0.20] },
            moai:          { src: '13_moai.png',                 w: 300, h: 340, collideRatio: [0.50, 0.30] },
            boulangerie:   { src: '14_fr_boulangerie.png',       w: 380, h: 380, collideRatio: [0.70, 0.25] },
            diner:         { src: '15_us_diner.png',             w: 380, h: 380, collideRatio: [0.75, 0.25] },
            pub:           { src: '16_uk_pub.png',               w: 370, h: 370, collideRatio: [0.70, 0.25] },
            phone_booth:   { src: '17_uk_telepohone.png',        w: 200, h: 270, collideRatio: [0.45, 0.30] },
            china_food:    { src: '18_cn_chinafood.png',         w: 240, h: 320, collideRatio: [0.40, 0.20] },
            milktea:       { src: '19_tw_milktea.png',           w: 280, h: 290, collideRatio: [0,    0   ] },
            red_light:     { src: '20_jp_redlight.png',          w: 180, h: 220, collideRatio: [0.30, 0.25] },
            bench:         { src: '21_bench.png',                w: 240, h: 180, collideRatio: [0,    0   ] },
            streetlight:   { src: '22_crosslight.png',           w: 140, h: 280, collideRatio: [0,    0   ] },
            flowers:       { src: '23_flowers.png',              w: 220, h: 180, collideRatio: [0,    0   ] },
            map_sign:      { src: '24_map.png',                  w: 240, h: 280, collideRatio: [0,    0   ] },
            arrow_sign:    { src: '25_arrow.png',                w: 200, h: 250, collideRatio: [0,    0   ] },
            sakura:        { src: '26_sakura.png',               w: 380, h: 380, collideRatio: [0.25, 0.25] }
        };
        // 이미지 프리로드
        for (const k in objectDefs) {
            const img = new Image();
            img.src = 'assets/objects/' + objectDefs[k].src;
            objectDefs[k].img = img;
        }

        // 오브젝트 인스턴스 배치 — (x, y)는 오브젝트의 발(footer) 좌표
        // === 1~9: 맵 3×3 그리드 (각 셀 1000×1000, 셀 중심에 메인 오브젝트) ===
        // [1 한옥문]    [2 여행센터]   [3 한옥상점]
        // [4 라멘집]    [7 빨간 다리]  [5 야시장]
        // [6 분수]      [8 갤러리]     [9 토리이]
        // 10~26: 나머지 미니어처/상점/소품은 셀 사이 공간에 자연 배치
        const objects = [
            // === 메인 1~9 (3×3 그리드 — 각 셀 중심) ===
            { key: 'hanok_gate',      x: 500,  y: 500  }, // 1 좌상
            { key: 'tourism_center',  x: 1500, y: 500  }, // 2 상단 중앙
            { key: 'hanok_shop',      x: 2500, y: 500  }, // 3 우상
            { key: 'ramen',           x: 500,  y: 1500 }, // 4 좌중
            { key: 'red_bridge',      x: 1500, y: 1500 }, // 7 정중앙 시냇물
            { key: 'night_market',    x: 2500, y: 1500 }, // 5 우중
            { key: 'fountain',        x: 500,  y: 2500 }, // 6 좌하
            { key: 'modern_gallery',  x: 1500, y: 2500 }, // 8 하단 중앙
            { key: 'torii',           x: 2500, y: 2500 }, // 9 우하

            // === 미니어처 랜드마크 (10~13) — 메인 옆 액센트 ===
            { key: 'statue_liberty',  x: 850,  y: 2700 }, // 분수(6) 옆 USA
            { key: 'big_ben',         x: 2200, y: 1750 }, // 야시장(5) 옆 UK
            { key: 'eiffel',          x: 2200, y: 2700 }, // 토리이(9) 옆 FR
            { key: 'moai',            x: 200,  y: 2650 }, // 좌하 가장자리

            // === 상점 (14~19) — 셀 안 메인 오브젝트 옆 ===
            { key: 'boulangerie',     x: 2000, y: 2700 }, // 토리이(9) 옆 FR
            { key: 'diner',           x: 850,  y: 2300 }, // 분수(6) 옆 US
            { key: 'pub',             x: 2000, y: 1750 }, // 야시장(5) 옆 UK
            { key: 'phone_booth',     x: 2750, y: 2100 }, // 야시장-토리이 사이 UK
            { key: 'china_food',      x: 2200, y: 750  }, // 한옥상점(3) 옆 CN
            { key: 'milktea',         x: 2750, y: 1300 }, // 한옥상점-야시장 사이 TW

            // === 작은 액센트 (20) ===
            { key: 'red_light',       x: 2300, y: 2300 }, // 토리이(9) 옆 등롱

            // === 벚꽃 (3개) — 자연 흩어짐 ===
            { key: 'sakura',          x: 1100, y: 900  },
            { key: 'sakura',          x: 1900, y: 1300 },
            { key: 'sakura',          x: 1100, y: 2200 },

            // === 벤치 (2개) ===
            { key: 'bench',           x: 1300, y: 900  },
            { key: 'bench',           x: 1700, y: 2200 },

            // === 가로등 (4개, 셀 경계 경로변) ===
            { key: 'streetlight',     x: 1000, y: 1000 },
            { key: 'streetlight',     x: 2000, y: 1000 },
            { key: 'streetlight',     x: 1000, y: 2000 },
            { key: 'streetlight',     x: 2000, y: 2000 },

            // === 화단 (2개) ===
            { key: 'flowers',         x: 900,  y: 1200 },
            { key: 'flowers',         x: 2100, y: 2200 },

            // === 안내판 ===
            { key: 'map_sign',        x: 800,  y: 300  }, // 입구(1) 옆
            { key: 'arrow_sign',      x: 1500, y: 1050 }  // 그리드 갈림길
        ];

        // 키 입력 상태
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        // 카메라 객체
        const camera = { x: 0, y: 0 };

        // 플레이어 객체
        const player = {
            x: WORLD_SIZE / 2,
            y: WORLD_SIZE / 2,
            size: 15,
            speed: 6,
            color: '#3b82f6',
            name: '나',
            img: playerImg,
            isMoving: false,
            bobPhase: Math.random() * Math.PI * 2 // 각 캐릭터의 보빙 위상차 (동기화 방지)
        };

        // 장애물 (충돌 박스) - objects[] 의 collideRatio 값을 기반으로 자동 생성.
        // 발(footer) 좌표 기준 발 footprint만 충돌 → 큰 건물도 윗부분(지붕/탑신)은 통과 가능 = 시각적 자연
        const buildings = [];
        for (const obj of objects) {
            const def = objectDefs[obj.key];
            const [cwR, chR] = def.collideRatio;
            if (cwR > 0 && chR > 0) {
                const cw = def.w * cwR;
                const ch = def.h * chR;
                buildings.push({
                    x: obj.x - cw / 2,
                    y: obj.y - ch,
                    w: cw,
                    h: ch,
                    label: obj.key
                });
            }
        }

        // 봇 (NPC) 배열 및 생성 로직
        const bots = [];
        const NUM_BOTS = 20;
        const botColors = ['#10b981', '#ec4899', '#8b5cf6', '#f97316', '#06b6d4'];

        for(let i=0; i<NUM_BOTS; i++) {
            bots.push({
                x: Math.random() * (WORLD_SIZE - 100) + 50,
                y: Math.random() * (WORLD_SIZE - 100) + 50,
                size: 15,
                speed: 2 + Math.random() * 2, // 2 ~ 4의 속도
                color: botColors[Math.floor(Math.random() * botColors.length)],
                name: `Bot-${i+1}`,
                targetX: Math.random() * WORLD_SIZE,
                targetY: Math.random() * WORLD_SIZE,
                img: botImgs[i], // i=0 → 캐릭터1.png, i=19 → 캐릭터20.png 순서대로 할당
                isMoving: false,
                bobPhase: Math.random() * Math.PI * 2 // 보빙 위상차
            });
        }

        // 수집품 (큐브)
        let cubes = [];
        const MAX_CUBES = 30;

        function spawnCube() {
            if (cubes.length >= MAX_CUBES) return;
            
            let x, y, validPosition;
            do {
                validPosition = true;
                x = Math.random() * (WORLD_SIZE - 100) + 50;
                y = Math.random() * (WORLD_SIZE - 100) + 50;

                for (let b of buildings) {
                    if (x > b.x - 20 && x < b.x + b.w + 20 && 
                        y > b.y - 20 && y < b.y + b.h + 20) {
                        validPosition = false;
                        break;
                    }
                }
            } while (!validPosition);

            cubes.push({ x: x, y: y, size: 10, color: '#f59e0b', bobOffset: Math.random() * Math.PI * 2 });
        }

        for(let i=0; i<20; i++) spawnCube();

        // 시작 위치가 어느 interaction zone 안이면 그 zone을 미리 active로 설정
        // → 게임 로드 직후 자동 팝업 트리거 방지. 사용자가 zone 밖으로 나갔다 다시 들어와야 팝업이 뜸.
        for (const obj of objects) {
            const def = objectDefs[obj.key];
            if (!def.interaction) continue;
            if (Math.hypot(player.x - obj.x, player.y - obj.y) < INTERACTION_RADIUS) {
                activeZoneKey = obj.key;
                break;
            }
        }

        // AABB 충돌 체크 함수 (반경 매개변수 추가)
        function checkCollision(nextX, nextY, radius) {
            if (nextX - radius < 0 || nextX + radius > WORLD_SIZE ||
                nextY - radius < 0 || nextY + radius > WORLD_SIZE) {
                return true;
            }

            for (let b of buildings) {
                let testX = nextX;
                let testY = nextY;

                if (nextX < b.x) testX = b.x;
                else if (nextX > b.x + b.w) testX = b.x + b.w;

                if (nextY < b.y) testY = b.y;
                else if (nextY > b.y + b.h) testY = b.y + b.h;

                let distX = nextX - testX;
                let distY = nextY - testY;
                let distance = Math.sqrt((distX*distX) + (distY*distY));

                if (distance <= radius) {
                    return true;
                }
            }
            return false;
        }

        // 1~9번 메인 오브젝트 진입 검사 (interaction 필드가 있는 것만)
        function checkInteractionZones() {
            if (popupOpen) return;
            let foundZone = null;
            for (const obj of objects) {
                const def = objectDefs[obj.key];
                if (!def.interaction) continue;
                const dist = Math.hypot(player.x - obj.x, player.y - obj.y);
                if (dist < INTERACTION_RADIUS) { foundZone = obj; break; }
            }
            if (foundZone && activeZoneKey !== foundZone.key) {
                showPopup(foundZone);
                activeZoneKey = foundZone.key;
            } else if (!foundZone) {
                activeZoneKey = null; // zone 밖으로 나가면 재트리거 가능
            }
        }

        // 게임 로직 업데이트
        function update() {
            frameCount++;

            // 팝업 떠 있는 동안 게임 일시정지 (이동/봇/큐브 모두 멈춤)
            if (popupOpen) return;

            // --- 플레이어 이동 로직 ---
            let dx = 0;
            let dy = 0;

            if (keys['ArrowUp'] || keys['KeyW']) dy -= player.speed;
            if (keys['ArrowDown'] || keys['KeyS']) dy += player.speed;
            if (keys['ArrowLeft'] || keys['KeyA']) dx -= player.speed;
            if (keys['ArrowRight'] || keys['KeyD']) dx += player.speed;

            if (dx !== 0 && dy !== 0) {
                const length = Math.sqrt(dx * dx + dy * dy);
                dx = (dx / length) * player.speed;
                dy = (dy / length) * player.speed;
            }

            const oldPx = player.x, oldPy = player.y;
            if (dx !== 0 && !checkCollision(player.x + dx, player.y, player.size)) player.x += dx;
            if (dy !== 0 && !checkCollision(player.x, player.y + dy, player.size)) player.y += dy;
            player.isMoving = (player.x !== oldPx || player.y !== oldPy);

            // --- 봇 이동 로직 ---
            bots.forEach(bot => {
                const oldBx = bot.x, oldBy = bot.y;
                let botDx = bot.targetX - bot.x;
                let botDy = bot.targetY - bot.y;
                let dist = Math.sqrt(botDx*botDx + botDy*botDy);

                // 목표 지점에 도달했거나 너무 가까워지면 새로운 목표 설정
                if (dist < 10) {
                    bot.targetX = Math.random() * WORLD_SIZE;
                    bot.targetY = Math.random() * WORLD_SIZE;
                } else {
                    let moveX = (botDx / dist) * bot.speed;
                    let moveY = (botDy / dist) * bot.speed;

                    // 건물과 충돌하지 않으면 이동, 충돌하면 즉시 새로운 방향(목표) 설정
                    if (!checkCollision(bot.x + moveX, bot.y + moveY, bot.size)) {
                        bot.x += moveX;
                        bot.y += moveY;
                    } else {
                        bot.targetX = Math.random() * WORLD_SIZE;
                        bot.targetY = Math.random() * WORLD_SIZE;
                    }
                }
                bot.isMoving = (bot.x !== oldBx || bot.y !== oldBy);
            });

            // 큐브 획득 판정
            for (let i = cubes.length - 1; i >= 0; i--) {
                const cube = cubes[i];
                const dist = Math.hypot(player.x - cube.x, player.y - cube.y);
                
                if (dist < player.size + cube.size + 10) {
                    cubes.splice(i, 1);
                    score += 100;
                    document.getElementById('score-display').innerText = score.toLocaleString();
                    spawnCube(); 
                    spawnCube(); 
                }
            }

            // 카메라 추적
            camera.x = player.x - canvas.width / 2;
            camera.y = player.y - canvas.height / 2;
            camera.x = Math.max(0, Math.min(camera.x, WORLD_SIZE - canvas.width));
            camera.y = Math.max(0, Math.min(camera.y, WORLD_SIZE - canvas.height));

            // 1~9 메인 오브젝트 진입 검사
            checkInteractionZones();
        }

        // 오브젝트(건물/소품) 그리는 함수 — (x, y)는 발(footer) 위치
        // 그림자 없음 (사용자 요청). 이미지 하단이 (x, y) = 바닥에 바로 닿음
        function drawObject(obj) {
            const def = objectDefs[obj.key];
            if (!def.img.complete || !def.img.naturalWidth) return;
            const { x, y } = obj;
            const { w, h } = def;
            ctx.drawImage(def.img, x - w/2, y - h, w, h);
        }

        // 큐브 그리는 함수 (z-sort에 포함시키기 위해 분리)
        function drawCube(cube) {
            const bob = Math.sin((frameCount * 0.05) + cube.bobOffset) * 5;
            ctx.save();
            ctx.translate(cube.x, cube.y + bob);
            ctx.rotate(frameCount * 0.02 + cube.bobOffset);
            ctx.fillStyle = cube.color;
            ctx.shadowColor = cube.color;
            ctx.shadowBlur = 15;
            ctx.fillRect(-cube.size/2, -cube.size/2, cube.size, cube.size);
            ctx.restore();
        }

        // 아바타 그리는 공통 함수 (플레이어 및 봇 재사용)
        function drawAvatar(entity, isPlayer = false) {
            const { x, y, size, color, name, img, isMoving, bobPhase = 0 } = entity;
            const drawSize = size * 2 * 4; // 원래 원 직경(size*2) 대비 4배 → 120px

            // === B: 걷는 모션 (squash & stretch) ===
            //   1) bobbing 진폭 절반 (이전 ±6 → ±3) : 미세한 발 디딤
            //   2) scaleY squash : sin이 음수일 때(발이 땅에 닿는 순간) 캐릭터를 살짝 눌러서
            //      "체중이 실리는" 시각 단서 제공. 발 위치(y+15)는 고정 — 머리 위로만 짧아짐
            const phase = frameCount * 0.35 + bobPhase;
            const sinV = Math.sin(phase);
            const bobOffset = isMoving ? sinV * 3 : 0;
            const sy = isMoving ? (1 - Math.max(0, -sinV) * 0.06) : 1; // 1.0 ~ 0.94
            const drawH = drawSize * sy;

            // 그림자 (캐릭터는 유지 — 캐릭터의 발이 어디 있는지 시각 가이드)
            ctx.fillStyle = 'rgba(0,0,0,0.55)';
            ctx.beginPath();
            ctx.ellipse(x, y + 15, size * 2.4, size * 1.1, 0, 0, Math.PI * 2);
            ctx.fill();

            // 캐릭터: 이미지 로드 완료 시 PNG, 미완료/실패 시 fallback 원형
            const imgReady = img && img.complete && img.naturalWidth > 0;
            if (imgReady) {
                // 발이 y+15 고정 + bobOffset, 높이는 squash로 짧아짐 (머리 위로만 줄어듦)
                ctx.drawImage(img, x - drawSize/2, y + 15 - drawH + bobOffset, drawSize, drawH);
            } else {
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(x, y + bobOffset, size, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = isPlayer ? '#fff' : 'rgba(255,255,255,0.5)';
                ctx.lineWidth = isPlayer ? 2 : 1;
                ctx.stroke();
            }

            // 이름표 (캐릭터 머리 위, squash + bobOffset 따라감)
            ctx.fillStyle = isPlayer ? '#38bdf8' : '#94a3b8';
            ctx.font = isPlayer ? 'bold 12px sans-serif' : '11px sans-serif';
            ctx.textAlign = 'center';
            const labelY = imgReady ? (y + 15 - drawH - 5 + bobOffset) : (y - 20 + bobOffset);
            ctx.fillText(name, x, labelY);
        }

        // 화면 그리기
        function draw() {
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            // 배경 맵 이미지 (로드 완료 시) 또는 fallback 다크
            // 채도·밝기 다운으로 오브젝트(voxel)·캐릭터(cel-shaded)와 톤 매칭 향상
            if (bgImg.complete && bgImg.naturalWidth > 0) {
                ctx.filter = 'saturate(0.6) brightness(0.92)';
                ctx.drawImage(bgImg, 0, 0, WORLD_SIZE, WORLD_SIZE);
                ctx.filter = 'none';
            } else {
                ctx.fillStyle = '#1e293b';
                ctx.fillRect(0, 0, WORLD_SIZE, WORLD_SIZE);
            }

            // 건물 시각 박스는 배경 이미지에 이미 그려져 있으므로 제거.
            // buildings[] 데이터는 충돌 판정용으로만 유지 (checkCollision, 큐브 스폰 회피).

            // === y-sort 드로어블: 오브젝트 + 큐브 + 봇 + 플레이어를 y 좌표 기준으로 정렬 후 그리기 ===
            // 화면 아래쪽(y가 큰)일수록 앞에 그려져서 자연스러운 톱뷰 깊이감 형성
            const drawables = [];
            for (const obj of objects)  drawables.push({ type: 'obj',    sortY: obj.y,        data: obj });
            for (const cube of cubes)   drawables.push({ type: 'cube',   sortY: cube.y,       data: cube });
            for (const bot of bots)     drawables.push({ type: 'bot',    sortY: bot.y + 15,   data: bot });
            drawables.push({                         type: 'player', sortY: player.y + 15,data: player });
            drawables.sort((a, b) => a.sortY - b.sortY);

            for (const d of drawables) {
                if (d.type === 'obj')         drawObject(d.data);
                else if (d.type === 'cube')   drawCube(d.data);
                else if (d.type === 'bot')    drawAvatar(d.data);
                else if (d.type === 'player') drawAvatar(d.data, true);
            }
            ctx.shadowBlur = 0; // 큐브 글로우 잔여 초기화

            ctx.restore();
        }

        // 게임 루프
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
