<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metaverse Plaza: Cube Collector with Bots</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0b1220;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        canvas {
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
        }
        .hud-box {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        h1 {
            margin: 0 0 5px 0;
            font-size: 20px;
            color: #38bdf8;
        }
        p {
            margin: 0;
            font-size: 14px;
            color: #cbd5e1;
        }
        #score-display {
            font-size: 24px;
            font-weight: bold;
            color: #f59e0b;
        }
        .controls {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="hud-box">
            <h1>메타버스 플라자</h1>
            <p>보유 큐브: <span id="score-display">0</span></p>
        </div>
        <div class="hud-box controls">
            <p>⌨️ <b>이동:</b> W, A, S, D 또는 방향키</p>
            <p>🎯 <b>목표:</b> 마을 곳곳에 생성되는 큐브를 수집하세요!</p>
            <p>🤖 <b>주민:</b> 맵을 돌아다니는 20명의 봇이 추가되었습니다.</p>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false; // 픽셀룩 보존

        // 화면 크기 설정
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.imageSmoothingEnabled = false; // canvas 크기 변경 시 context 상태가 리셋되므로 재설정
        }
        window.addEventListener('resize', resize);
        resize();

        // 게임 설정
        const WORLD_SIZE = 3000;
        let score = 0;
        let frameCount = 0;

        // 캐릭터 이미지 프리로드 (플레이어 1 + 봇 20 = 21장)
        const playerImg = new Image();
        playerImg.src = 'assets/avatars/0. 메인캐릭터.png';
        const botImgs = [];
        for (let i = 1; i <= 20; i++) {
            const img = new Image();
            img.src = `assets/avatars/캐릭터${i}.png`;
            botImgs.push(img);
        }

        // 배경 맵 이미지 (1024×1024 → 게임 좌표 3000×3000 으로 nearest-neighbor 업스케일)
        const bgImg = new Image();
        bgImg.src = 'assets/game/결과물1.png';

        // 키 입력 상태
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        // 카메라 객체
        const camera = { x: 0, y: 0 };

        // 플레이어 객체
        const player = {
            x: WORLD_SIZE / 2,
            y: WORLD_SIZE / 2,
            size: 15,
            speed: 6,
            color: '#3b82f6',
            name: '나',
            img: playerImg
        };

        // 장애물 (건물, 구역 등) - 배경 결과물1.png 의 zone 위치에 맞춰 재정의
        // 1024 px 이미지 기준 좌표를 3000 px 게임 좌표계로 환산 (×2.93)
        const buildings = [
            { x: 250,  y: 150,  w: 550, h: 350, label: '입구 구역' },   // 좌상 - 한옥 대문
            { x: 1050, y: 120,  w: 550, h: 480, label: '여행 센터' },   // 상단 중앙 - 한옥 기와
            { x: 2050, y: 150,  w: 700, h: 550, label: '이벤트 광장' }, // 우상 - 원형 무대
            { x: 150,  y: 800,  w: 650, h: 550, label: '상점가' },      // 좌중 - 노점
            { x: 2100, y: 850,  w: 600, h: 600, label: '유저 공간' },   // 우중 - 정자
            { x: 950,  y: 1700, w: 800, h: 550, label: '전시관' }       // 하단 중앙 - 갤러리
        ];

        // 봇 (NPC) 배열 및 생성 로직
        const bots = [];
        const NUM_BOTS = 20;
        const botColors = ['#10b981', '#ec4899', '#8b5cf6', '#f97316', '#06b6d4'];

        for(let i=0; i<NUM_BOTS; i++) {
            bots.push({
                x: Math.random() * (WORLD_SIZE - 100) + 50,
                y: Math.random() * (WORLD_SIZE - 100) + 50,
                size: 15,
                speed: 2 + Math.random() * 2, // 2 ~ 4의 속도
                color: botColors[Math.floor(Math.random() * botColors.length)],
                name: `Bot-${i+1}`,
                targetX: Math.random() * WORLD_SIZE,
                targetY: Math.random() * WORLD_SIZE,
                img: botImgs[i] // i=0 → 캐릭터1.png, i=19 → 캐릭터20.png 순서대로 할당
            });
        }

        // 수집품 (큐브)
        let cubes = [];
        const MAX_CUBES = 30;

        function spawnCube() {
            if (cubes.length >= MAX_CUBES) return;
            
            let x, y, validPosition;
            do {
                validPosition = true;
                x = Math.random() * (WORLD_SIZE - 100) + 50;
                y = Math.random() * (WORLD_SIZE - 100) + 50;

                for (let b of buildings) {
                    if (x > b.x - 20 && x < b.x + b.w + 20 && 
                        y > b.y - 20 && y < b.y + b.h + 20) {
                        validPosition = false;
                        break;
                    }
                }
            } while (!validPosition);

            cubes.push({ x: x, y: y, size: 10, color: '#f59e0b', bobOffset: Math.random() * Math.PI * 2 });
        }

        for(let i=0; i<20; i++) spawnCube();

        // AABB 충돌 체크 함수 (반경 매개변수 추가)
        function checkCollision(nextX, nextY, radius) {
            if (nextX - radius < 0 || nextX + radius > WORLD_SIZE ||
                nextY - radius < 0 || nextY + radius > WORLD_SIZE) {
                return true;
            }

            for (let b of buildings) {
                let testX = nextX;
                let testY = nextY;

                if (nextX < b.x) testX = b.x;
                else if (nextX > b.x + b.w) testX = b.x + b.w;

                if (nextY < b.y) testY = b.y;
                else if (nextY > b.y + b.h) testY = b.y + b.h;

                let distX = nextX - testX;
                let distY = nextY - testY;
                let distance = Math.sqrt((distX*distX) + (distY*distY));

                if (distance <= radius) {
                    return true;
                }
            }
            return false;
        }

        // 게임 로직 업데이트
        function update() {
            frameCount++;

            // --- 플레이어 이동 로직 ---
            let dx = 0;
            let dy = 0;

            if (keys['ArrowUp'] || keys['KeyW']) dy -= player.speed;
            if (keys['ArrowDown'] || keys['KeyS']) dy += player.speed;
            if (keys['ArrowLeft'] || keys['KeyA']) dx -= player.speed;
            if (keys['ArrowRight'] || keys['KeyD']) dx += player.speed;

            if (dx !== 0 && dy !== 0) {
                const length = Math.sqrt(dx * dx + dy * dy);
                dx = (dx / length) * player.speed;
                dy = (dy / length) * player.speed;
            }

            if (dx !== 0 && !checkCollision(player.x + dx, player.y, player.size)) player.x += dx;
            if (dy !== 0 && !checkCollision(player.x, player.y + dy, player.size)) player.y += dy;

            // --- 봇 이동 로직 ---
            bots.forEach(bot => {
                let botDx = bot.targetX - bot.x;
                let botDy = bot.targetY - bot.y;
                let dist = Math.sqrt(botDx*botDx + botDy*botDy);

                // 목표 지점에 도달했거나 너무 가까워지면 새로운 목표 설정
                if (dist < 10) {
                    bot.targetX = Math.random() * WORLD_SIZE;
                    bot.targetY = Math.random() * WORLD_SIZE;
                } else {
                    let moveX = (botDx / dist) * bot.speed;
                    let moveY = (botDy / dist) * bot.speed;

                    // 건물과 충돌하지 않으면 이동, 충돌하면 즉시 새로운 방향(목표) 설정
                    if (!checkCollision(bot.x + moveX, bot.y + moveY, bot.size)) {
                        bot.x += moveX;
                        bot.y += moveY;
                    } else {
                        bot.targetX = Math.random() * WORLD_SIZE;
                        bot.targetY = Math.random() * WORLD_SIZE;
                    }
                }
            });

            // 큐브 획득 판정
            for (let i = cubes.length - 1; i >= 0; i--) {
                const cube = cubes[i];
                const dist = Math.hypot(player.x - cube.x, player.y - cube.y);
                
                if (dist < player.size + cube.size + 10) {
                    cubes.splice(i, 1);
                    score += 100;
                    document.getElementById('score-display').innerText = score.toLocaleString();
                    spawnCube(); 
                    spawnCube(); 
                }
            }

            // 카메라 추적
            camera.x = player.x - canvas.width / 2;
            camera.y = player.y - canvas.height / 2;
            camera.x = Math.max(0, Math.min(camera.x, WORLD_SIZE - canvas.width));
            camera.y = Math.max(0, Math.min(camera.y, WORLD_SIZE - canvas.height));
        }

        // 아바타 그리는 공통 함수 (플레이어 및 봇 재사용)
        function drawAvatar(entity, isPlayer = false) {
            const { x, y, size, color, name, img } = entity;
            const drawSize = size * 2 * 4; // 원래 원 직경(size*2) 대비 4배 → 120px

            // 그림자 (원본 충돌 반경 기준, y+15 위치 유지)
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.beginPath();
            ctx.ellipse(x, y + 15, size, size/2, 0, 0, Math.PI * 2);
            ctx.fill();

            // 캐릭터: 이미지 로드 완료 시 PNG, 미완료/실패 시 fallback 원형
            const imgReady = img && img.complete && img.naturalWidth > 0;
            if (imgReady) {
                // 발이 그림자 중심(y+15)에 닿도록 정렬
                ctx.drawImage(img, x - drawSize/2, y + 15 - drawSize, drawSize, drawSize);
            } else {
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = isPlayer ? '#fff' : 'rgba(255,255,255,0.5)';
                ctx.lineWidth = isPlayer ? 2 : 1;
                ctx.stroke();
            }

            // 이름표 (캐릭터 머리 위)
            ctx.fillStyle = isPlayer ? '#38bdf8' : '#94a3b8';
            ctx.font = isPlayer ? 'bold 12px sans-serif' : '11px sans-serif';
            ctx.textAlign = 'center';
            const labelY = imgReady ? (y + 15 - drawSize - 5) : (y - 20);
            ctx.fillText(name, x, labelY);
        }

        // 화면 그리기
        function draw() {
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            // 배경 맵 이미지 (로드 완료 시) 또는 fallback 다크
            if (bgImg.complete && bgImg.naturalWidth > 0) {
                ctx.drawImage(bgImg, 0, 0, WORLD_SIZE, WORLD_SIZE);
            } else {
                ctx.fillStyle = '#1e293b';
                ctx.fillRect(0, 0, WORLD_SIZE, WORLD_SIZE);
            }

            // 건물 시각 박스는 배경 이미지에 이미 그려져 있으므로 제거.
            // buildings[] 데이터는 충돌 판정용으로만 유지 (checkCollision, 큐브 스폰 회피).

            // 큐브
            cubes.forEach(cube => {
                const bob = Math.sin((frameCount * 0.05) + cube.bobOffset) * 5; 
                ctx.save();
                ctx.translate(cube.x, cube.y + bob);
                ctx.rotate(frameCount * 0.02 + cube.bobOffset); 
                ctx.fillStyle = cube.color;
                ctx.shadowColor = cube.color;
                ctx.shadowBlur = 15;
                ctx.fillRect(-cube.size/2, -cube.size/2, cube.size, cube.size);
                ctx.restore();
            });

            // 글로우 효과 초기화
            ctx.shadowBlur = 0; 

            // 봇 그리기
            bots.forEach(bot => {
                drawAvatar(bot);
            });

            // 플레이어 그리기
            drawAvatar(player, true);

            ctx.restore();
        }

        // 게임 루프
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
